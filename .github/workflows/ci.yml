name: CI

# CI — push/main 时验证代码可编译，PR 时也验证
on:
    push:
        branches: [main]
        paths-ignore:
            - "**.md"
            - "docs/**"
    pull_request:
        branches: [main]
        paths-ignore:
            - "**.md"
            - "docs/**"

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read

jobs:
    build:
        runs-on: macos-26

        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  fetch-depth: 1

            - name: Select Xcode 26.4
              run: |
                  sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
                  echo "Xcode Path: $(xcode-select -p)"
                  xcodebuild -version
                  swift --version

            - name: Install XcodeGen
              run: which xcodegen || brew install xcodegen

            - name: Generate Xcode Project
              run: xcodegen generate

            - name: Cache SPM Dependencies
              uses: actions/cache@v5
              with:
                  path: |
                      ~/Library/Caches/org.swift.swiftpm
                  key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-spm-

            - name: Build (verify compilation)
              run: |
                  xcodebuild -project Swallpaper.xcodeproj \
                    -scheme Swallpaper \
                    -destination 'platform=macOS' \
                    -configuration Release \
                    -derivedDataPath build \
                    SWIFT_STRICT_CONCURRENCY=minimal \
                    DEBUG_INFORMATION_FORMAT=dwarf \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGNING_ALLOWED=NO \
                    clean build
